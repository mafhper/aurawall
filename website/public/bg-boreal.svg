<svg viewBox="0 0 1600 900" style="background-color:#faf5ff" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><defs><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.0012" numOctaves="3" stitchTiles="stitch"></feTurbulence><feColorMatrix type="saturate" values="0"></feColorMatrix><feComponentTransfer><feFuncA type="linear" slope="0.22"></feFuncA></feComponentTransfer></filter><filter id="blur-aa1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="100" result="coloredBlur"></feGaussianBlur></filter><filter id="blur-aa2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="120" result="coloredBlur"></feGaussianBlur></filter><filter id="blur-aa3" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="80" result="coloredBlur"></feGaussianBlur></filter><filter id="blur-aa4" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="60" result="coloredBlur"></feGaussianBlur></filter></defs><rect width="100%" height="100%" fill="#faf5ff"></rect><g><g><g id="shape-aa1"><circle cx="20%" cy="20%" r="60%" fill="#d8b4fe" opacity="0.6" filter="url(#blur-aa1)" style="mix-blend-mode:multiply;transform-box:fill-box"></circle></g></g><g><g id="shape-aa2"><circle cx="80%" cy="80%" r="70%" fill="#f9a8d4" opacity="0.5" filter="url(#blur-aa2)" style="mix-blend-mode:multiply;transform-box:fill-box"></circle></g></g><g><g id="shape-aa3"><circle cx="50%" cy="50%" r="45%" fill="#bae6fd" opacity="0.7" filter="url(#blur-aa3)" style="mix-blend-mode:multiply;transform-box:fill-box"></circle></g></g><g><g id="shape-aa4"><circle cx="50%" cy="40%" r="30%" fill="#ffffff" opacity="0.9" filter="url(#blur-aa4)" style="mix-blend-mode:overlay;transform-box:fill-box"></circle></g></g></g><rect width="100%" height="100%" filter="url(#noiseFilter)" opacity="1" style="mix-blend-mode:overlay"></rect></svg>