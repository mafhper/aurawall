<svg viewBox="0 0 1600 900" style="background-color:#0a0a0a" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice"><defs><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.003" numOctaves="3" stitchTiles="stitch"></feTurbulence><feColorMatrix type="saturate" values="0"></feColorMatrix><feComponentTransfer><feFuncA type="linear" slope="0.4"></feFuncA></feComponentTransfer></filter><filter id="blur-lm1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="30" result="coloredBlur"></feGaussianBlur></filter><filter id="blur-lm2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="40" result="coloredBlur"></feGaussianBlur></filter><filter id="blur-lm3" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="60" result="coloredBlur"></feGaussianBlur></filter></defs><rect width="100%" height="100%" fill="#0a0a0a"></rect><g><g><g id="shape-lm1"><circle cx="40%" cy="40%" r="45%" fill="#ffffff" opacity="0.8" filter="url(#blur-lm1)" style="mix-blend-mode:exclusion;transform-box:fill-box"></circle></g></g><g><g id="shape-lm2"><circle cx="60%" cy="60%" r="50%" fill="#cccccc" opacity="0.7" filter="url(#blur-lm2)" style="mix-blend-mode:difference;transform-box:fill-box"></circle></g></g><g><g id="shape-lm3"><circle cx="50%" cy="50%" r="60%" fill="#333333" opacity="0.5" filter="url(#blur-lm3)" style="mix-blend-mode:overlay;transform-box:fill-box"></circle></g></g></g><rect width="100%" height="100%" filter="url(#noiseFilter)" opacity="1" style="mix-blend-mode:overlay"></rect></svg>